{% extends 'base.html' %}
{% block content %}
<div style="max-width:700px; margin:0 auto; text-align:center;">
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e); border:2px solid #6c63ff50; border-radius:24px; padding:60px 40px; position:relative; overflow:hidden;">
        <div style="position:absolute; top:-50px; left:-50px; width:200px; height:200px; background:radial-gradient(circle,#6c63ff20,transparent);"></div>
        <div style="position:absolute; bottom:-50px; right:-50px; width:200px; height:200px; background:radial-gradient(circle,#00d4ff20,transparent);"></div>

        <div style="font-size:3rem; margin-bottom:16px;">🏆</div>
        <p style="color:#888; font-size:0.9rem; letter-spacing:3px; text-transform:uppercase;">Сертификат</p>
        <h1 style="font-weight:800; font-size:2rem; margin:16px 0;">{{ user.get_full_name|default:user.username }}</h1>
        <p style="color:#aaa;">мына курсты сәтті аяқтады:</p>
        <h2 style="background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent; font-weight:800; margin:16px 0;">
            {{ course.title }}
        </h2>
        <p style="color:#666; font-size:0.9rem; margin-top:32px;">⚡ ByteLearn платформасы</p>

        <button onclick="window.print()" class="btn btn-glow mt-4" style="padding:12px 32px;">
            🖨️ Басып шығару
        </button>
    </div>
</div>
{% endblock %}
