{% extends 'base.html' %}
{% block content %}
<h2 style="font-weight:800;">{{ course.title }}</h2>
<p style="color:#888;">Прогресс: {{ done }}/{{ total }} сабақ</p>

<div style="background:#1a1a2e; border-radius:12px; height:8px; margin-bottom:32px;">
    <div style="background:linear-gradient(135deg,#6c63ff,#00d4ff); height:8px; border-radius:12px; width:{{ percent }}%;"></div>
</div>

<div class="d-flex flex-column gap-3">
    {% for lesson in lessons %}
    <a href="{% url 'lesson_detail' course.pk lesson.pk %}"
       style="text-decoration:none;">
        <div style="background:#1a1a2e; border:1px solid {% if lesson.pk in completed_ids %}#6c63ff50{% else %}#ffffff10{% endif %}; border-radius:14px; padding:20px; display:flex; align-items:center; gap:16px; transition:all 0.3s;">
            <div style="width:40px; height:40px; border-radius:50%; background:{% if lesson.pk in completed_ids %}linear-gradient(135deg,#6c63ff,#00d4ff){% else %}#ffffff10{% endif %}; display:flex; align-items:center; justify-content:center; font-weight:700;">
                {% if lesson.pk in completed_ids %}✓{% else %}{{ forloop.counter }}{% endif %}
            </div>
            <span style="color:#fff; font-weight:600;">{{ lesson.title }}</span>
        </div>
    </a>
    {% endfor %}
</div>

<div style="display:flex; gap:12px; margin-top:32px;">
    <a href="{% url 'forum' course.pk %}" class="btn-outline-glow" style="text-decoration:none; padding:10px 20px;">💬 Форум</a>
    <a href="{% url 'quiz' course.pk %}" class="btn-glow" style="text-decoration:none; padding:10px 20px;">🧪 Тест тапсыру</a>
</div>
{% endblock %}
